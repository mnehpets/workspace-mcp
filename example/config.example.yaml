# config.example.yaml — copy to config.yaml (gitignored) and edit.
# Secrets never go here; see secrets.example.env.

server:
  # Plain TCP listener — used when ngrok.enabled is false.
  host: 127.0.0.1
  port: 3850

  # Built-in ngrok tunnel. When enabled, the server dials ngrok directly —
  # no external `ngrok` process or ngrok.yml needed. host/port are ignored.
  # The public URL is logged at startup.
  # ngrok:
  #   enabled: true
  #   authtoken:
  #     env: NGROK_AUTHTOKEN        # resolved from secrets.env / OS env
  #   domain: my-reserved-host.ngrok.app   # optional: pin a reserved domain

  # Origin-header allowlist (Streamable-HTTP DNS-rebinding defense, MCP 2025-11-25).
  # A request whose Origin header is PRESENT but not listed is rejected with 403.
  # Requests with no Origin header (non-browser clients — the normal case for MCP
  # traffic, including claude.ai's cloud connector) are always allowed. Omitted
  # means an empty allowlist: Origin-less requests pass and ANY present Origin is
  # rejected (a present Origin can only be a browser — the rebinding case). Add an
  # origin to allow a browser client (e.g. local dev), or ["*"] to disable.
  # allowedOrigins:
  #   - http://localhost:6274   # e.g. the MCP Inspector UI, if you drive it from a browser

auth:
  bearerToken:
    env: MCP_BEARER_TOKEN         # resolved from secrets.env / OS env, never stored here
  # For zero-lockstep rotation, configure a list instead of the single
  # `bearerToken` above (set one or the other, not both). The server accepts a
  # request bearing ANY listed token: add the new one, switch claude.ai over at
  # your leisure, then drop the old one.
  # bearerTokens:
  #   - env: MCP_BEARER_TOKEN       # current
  #   - env: MCP_BEARER_TOKEN_NEXT  # next (during rotation)

  # OAuth 2.0 authorization code flow — required for claude.ai connectors,
  # which only support OAuth. clientID is public (plain string); clientSecret
  # is a secret reference. Access tokens are dynamically issued per session
  # (self-contained AEAD; no server-side store). bearerToken/bearerTokens and
  # oauth may both be configured; the server accepts any valid credential.
  # oauth:
  #   clientID: workspace-mcp
  #   clientSecret:
  #     env: OAUTH_CLIENT_SECRET

# One or more named directory trees. The tool `workspace` param selects one and
# defaults to "default". Permissions (policy/read/grep/gitignore) are per-workspace.
workspaces:
  - name: default
    root: /absolute/path/to/a/tree     # this workspace's os.Root sandbox
    # description: "What this tree is for."  # optional; shown in workspace_list so
                                             # the model picks by intent. Omit to fall
                                             # back to the README's first section.
    respectGitignore: true             # via grrep IgnoreSet (works on any tree)
    policy:                            # allow/deny on top of os.Root (BLOCKED wins)
      allowGlobs:
        - "**/*.md"
        - "**/*.go"
        - "**/*.txt"
        - "docs/**"
        - "README*"
      blockGlobs:
        - ".git/**"
        - "**/.env"
        - "**/.env.*"
        - "**/*secret*"
        - "**/*credential*"
        - "**/*.pem"
        - "**/*.key"
        - "**/id_rsa*"
        - "**/.ssh/**"
        - "**/node_modules/**"
    read:
      maxBytes: 1000000
    grep:
      enabled: true
      workers: 0                       # 0 = GOMAXPROCS
      maxMatches: 500
    write:
      enabled: false                   # opt-in writes (file_create/overwrite/replace).
                                       # Default off → those tools are hidden and any
                                       # call returns READ_ONLY. Writes are gated by the
                                       # SAME policy as reads (blockGlobs still win), and
                                       # the server never commits/pushes/deletes/renames —
                                       # the human reviews `git diff` and commits.

  - name: notes                        # a second, tighter workspace
    root: /absolute/path/to/notes
    respectGitignore: false
    policy:
      allowGlobs: ["**/*.md"]
      blockGlobs: ["**/.git/**"]
    read:
      maxBytes: 250000
    grep:
      enabled: true
      workers: 0
      maxMatches: 200

log:
  level: info
