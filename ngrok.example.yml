# ngrok.example.yml — copy to ngrok.yml and edit.
# Exposes ONLY this server. Run with:  ngrok start --config ngrok.yml workspace-mcp
version: "3"
agent:
  authtoken: <your-ngrok-authtoken>
endpoints:
  - name: workspace-mcp
    url: https://<reserved-subdomain>.ngrok.app   # reserve a domain in the ngrok dashboard
    upstream:
      url: 3850                                    # must match server.port in config.yaml
    # Defense in depth at the edge — keep this on, don't rely on the bearer alone.
    # Pick ONE (or combine) of the traffic-policy options ngrok supports on your plan:
    # traffic_policy:
    #   inline:
    #     on_http_request:
    #       - actions:
    #           - type: basic-auth
    #             config:
    #               credentials:
    #                 - "user:password"
